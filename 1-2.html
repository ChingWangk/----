<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚力暖心服务 共绘客户盈利新蓝图</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    
    

    <!-- 幻灯片容器 -->
    <div class="slides-wrapper" id="slidesWrapper">
        

        <!-- 第4页：四维驱动成效 -->
        <div class="slide slide-4">
            <div class="leaf-background">
                
                <div class="leaf-bg-2"></div>
                <div class="leaf-bg-3"></div>
            </div>
            <div class="slide-content">
                <h2 class="section-title">"四维驱动"服务成效</h2>
                <div style="text-align: center; margin-bottom: 30px;">
                    <p style="font-size: 20px; color: #e74c3c; font-weight: 600;">
                        拓客源 · 去库存 · 减负担 · 强信心
                    </p>
                </div>
                <div class="achievement-grid">
                    <div class="achievement-item">
                        <div class="achievement-number">80笔</div>
                        <div class="achievement-text">政企联动银发市集成交量<br>触达300份宣传单页</div>
                    </div>
                    <div class="achievement-item">
                        <div class="achievement-number">130条</div>
                        <div class="achievement-text">跨界合作库存卷烟销售<br>雪茄销售18盒</div>
                    </div>
                    <div class="achievement-item">
                        <div class="achievement-number">50名</div>
                        <div class="achievement-text">园区地摊精准拓客<br>中青年消费者入群</div>
                    </div>
                    <div class="achievement-item">
                        <div class="achievement-number">5家</div>
                        <div class="achievement-text">便民服务联盟组建<br>统一价格与服务标准</div>
                    </div>
                </div>
            </div>
            <div class="leaf-container">
                <div class="leaf leaf-1"></div>
                <div class="leaf leaf-2"></div>
                <div class="leaf leaf-3"></div>
                <div class="leaf leaf-4"></div>
                <div class="leaf leaf-5"></div>
            </div>
        </div>

        <!-- 第5页：实践感悟 -->
        <div class="slide slide-5">
            <div class="slide-content">
                <h2 class="section-title">实践体会与感悟</h2>
                <div class="conclusion-content">
                    <div class="conclusion-quote">
                        "零售客户的痛点就是服务的起点，市场的难点就是创新的方向"
                    </div>
                    <div class="conclusion-points">
                        <p style="margin-bottom: 25px;">
                            <strong>服务升级三大转变：</strong><br>
                            从"坐商变行商" → 三区联动地摊模式<br>
                            从"单打变团战" → 跨界去库存合作<br>
                            从"被动变主动" → 服务升级与资源共享
                        </p>
                        <p>
                            <strong>核心理念：</strong>把客户的事当自己的事，把终端的难当自己的难，在市场挑战中与客户共成长，实现客我共赢的良性循环。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    

    

        
        
    </div>
    <script src="script1.js"></script>
</body>
</html>
