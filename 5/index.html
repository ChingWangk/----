<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="photo-wall-bg">
        <div class="photo-wall-overlay"></div>
        
        <div class="photo-item photo-large photo-1">
            <img src="https://picsum.photos/seed/photo1/280/200.jpg" alt="照片1">
        </div>
        <div class="photo-item photo-medium photo-2">
            <img src="https://picsum.photos/seed/photo2/200/150.jpg" alt="照片2">
        </div>
        <div class="photo-item photo-small photo-3">
            <img src="https://picsum.photos/seed/photo3/150/120.jpg" alt="照片3">
        </div>
        <div class="photo-item photo-tall photo-4">
            <img src="https://picsum.photos/seed/photo4/120/200.jpg" alt="照片4">
        </div>
        <div class="photo-item photo-wide photo-5">
            <img src="https://picsum.photos/seed/photo5/250/130.jpg" alt="照片5">
        </div>
        <div class="photo-item photo-large photo-6">
            <img src="https://picsum.photos/seed/photo6/280/200.jpg" alt="照片6">
        </div>
        <div class="photo-item photo-medium photo-7">
            <img src="https://picsum.photos/seed/photo7/200/150.jpg" alt="照片7">
        </div>
        <div class="photo-item photo-small photo-8">
            <img src="https://picsum.photos/seed/photo8/150/120.jpg" alt="照片8">
        </div>
        <div class="photo-item photo-tall photo-9">
            <img src="https://picsum.photos/seed/photo9/120/200.jpg" alt="照片9">
        </div>
        <div class="photo-item photo-wide photo-10">
            <img src="https://picsum.photos/seed/photo10/250/130.jpg" alt="照片10">
        </div>
        <div class="photo-item photo-medium photo-11">
            <img src="https://picsum.photos/seed/photo11/200/150.jpg" alt="照片11">
        </div>
        <div class="photo-item photo-small photo-12">
            <img src="https://picsum.photos/seed/photo12/150/120.jpg" alt="照片12">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
