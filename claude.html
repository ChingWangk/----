<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚力暖心服务 共绘客户盈利新蓝图</title>
    <link rel="stylesheet" href="claude.css">
</head>
<body>
    
    <div class="presentation-container">
        <!-- 幻灯片容器 -->
        <button class="back-btn" id="backBtn">←</button>
        
        <div class="slides-wrapper" id="slidesWrapper">
            <!-- 标题页 -->
            <div class="slide active title-slide" id="slide-0">
                <div class="leaf-background">
                    <div class="leaf-bg-3"></div>
                </div>
                <div class="slide-content">
                    <h1 class="main-title">聚力暖心服务</h1>
                    <h2 class="subtitle">共绘客户盈利新蓝图</h2>
                    <p class="subtitle">——杨浦公司"四维驱动"服务升级实践报告</p>
                </div>
            </div>

            <!-- 项目背景主页 -->
            <div class="slide" id="slide-1">
                <div class="leaf-background">
                    <div class="leaf-bg-3"></div>
                </div>
                <div class="slide-content">
                    <h2 class="section-title">项目背景</h2>
                    <div class="overview-grid">
                        <div class="overview-card" onclick="goToSlide(2)">
                            <h3>知民意</h3>
                            <p>在客户满意中探冷暖</p>
                        </div>
                        <div class="overview-card" onclick="goToSlide(3)">
                            <h3>观市场</h3>
                            <p>在经营数据中找痛点</p>
                        </div>
                        <div class="overview-card" onclick="goToSlide(4)">
                            <h3>学政策</h3>
                            <p>在行业导向中树信念</p>
                        </div>
                        <div class="overview-card" onclick="goToSlide(5)">
                            <h3>总结</h3>
                            <p>项目背景小结</p>
                        </div>
                    </div>
                </div>
            </div>

        <div class="slides-wrapper" id="slidesWrapper">

            <!-- 最后一页 -->
            <div class="slide slide-theme">
                <div class="leaf-background">
                    <div class="leaf-bg-3"></div>
                </div>
                
                <div class="slide-content">
                    <h2 class="section-title">实践体会与感悟</h2>
                    <div class="conclusion-content">
                        <div class="conclusion-quote">
                            "零售客户的痛点就是服务的起点，市场的难点就是创新的方向"
                        </div>
                        <div class="conclusion-points">
                            <p style="margin-bottom: 25px;">
                                <strong>服务升级三大转变：</strong><br>
                                从"坐商变行商" → 三区联动地摊模式<br>
                                从"单打变团战" → 跨界去库存合作<br>
                                从"被动变主动" → 服务升级与资源共享
                            </p>
                            <p>
                                <strong>核心理念：</strong>把客户的事当自己的事，把终端的难当自己的难，在市场挑战中与客户共成长，实现客我共赢的良性循环。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script1.js"></script>
</body>
</html>
